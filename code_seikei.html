<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JS 暗号化ツール</title>

<link rel="stylesheet" type="text/css" href="./mi/style.css">
<link rel="icon" href="https://avatars.githubusercontent.com/u/131579504?v=2" type="image/png">
<link rel="apple-touch-icon" sizes="180x180" href="https://avatars.githubusercontent.com/u/131579504?v=2">

<meta name="Description" content="minecraft 系で役に立つかも？">
<meta name="theme-color" content="#f3fca3">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/javascript-obfuscator/dist/index.browser.js"></script>

<style>
textarea{
  width:90%;
  height:150px;
}
button{
  margin:5px;
}
</style>

</head>
<body>

<h2>入力</h2>
<textarea id="input"></textarea>
<br>

<button onclick="obf()">難読化</button>
<button onclick="encode()">暗号化(Base64)</button>
<button onclick="decode()">復元(Base64)</button>
<button onclick="deobf()">難読化コード復元</button>
<button onclick="copy()">Copy</button>

<h2>出力</h2>
<textarea id="output"></textarea>

<script>

// ===== Base64判定 =====
function isBase64(str){
  return /^[A-Za-z0-9+/=_-]+$/.test(str);
}

// ===== 難読化 =====
function obf(){
  const code = document.getElementById("input").value;

  const result = JavaScriptObfuscator.obfuscate(code,{
    compact:true,
    controlFlowFlattening:true,
    controlFlowFlatteningThreshold:1,
    numbersToExpressions:true,
    stringArray:true,
    stringArrayEncoding:["base64"],
    stringArrayThreshold:1
  });

  document.getElementById("output").value =
    result.getObfuscatedCode();
}

// ===== エンコード =====
function encode(){
  const code = document.getElementById("input").value;

  try {
    const encoded = btoa(unescape(encodeURIComponent(code)));
    document.getElementById("output").value = encoded;
  } catch (e) {
    document.getElementById("output").value =
      "エンコード失敗\n" + e.message;
  }
}

// ===== デコード =====
function decode(){
  const code = document.getElementById("input").value.trim();

  if (!isBase64(code)) {
    document.getElementById("output").value =
      "Base64ではありません（難読化コードの可能性）\n" +
      "ID: " + code.slice(0, 40);
    return;
  }

  try {
    let str = code;
    str = str.replace(/-/g, '+').replace(/_/g, '/');
    while (str.length % 4) str += '=';

    const decoded = decodeURIComponent(
      Array.prototype.map.call(atob(str), c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
      ).join('')
    );

    document.getElementById("output").value = decoded;

  } catch (e) {
    document.getElementById("output").value =
      "デコード失敗\n" +
      "Error: " + e.message + "\n" +
      "ID: " + code.slice(0, 40);
  }
}

// ===== 難読化コード復元 =====
function deobf(){
  const code = document.getElementById("input").value;

  try {
    const logs = [];
    const consoleMock = {
      log: (...args) => logs.push(args.join(" ")),
      error: (...args) => logs.push("ERROR: " + args.join(" "))
    };

    const wrapped = `
      (function(){
        const console = arguments[0];
        ${code}

        // _0x系関数を探して展開
        for (let key in window) {
          try {
            if (typeof window[key] === "function" && key.startsWith("_0x")) {
              for (let i = 0; i < 300; i++) {
                try {
                  console.log(key + "(" + i + ") = " + window[key](i));
                } catch(e){}
              }
            }
          } catch(e){}
        }
      })
    `;

    eval(wrapped)(consoleMock);

    if (logs.length === 0) {
      document.getElementById("output").value =
        "復元できませんでした（構造違いの可能性）";
    } else {
      document.getElementById("output").value =
        logs.join("\n");
    }

  } catch (e) {
    document.getElementById("output").value =
      "復元失敗\n" + e.message;
  }
}

// ===== コピー =====
function copy(){
  const out = document.getElementById("output");

  out.select();
  out.setSelectionRange(0,99999);

  navigator.clipboard.writeText(out.value);

  alert("コピーしました");
}

</script>

</body>
</html>
