<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JS 暗号化ツール</title>
  <link rel="stylesheet" type="text/css" href="./mi/style.css">
  <!-- ブラウザ用ファビコン -->
  <link rel="icon" href="https://avatars.githubusercontent.com/u/131579504?v=2" type="image/png">
  <!-- iOS / iPhone ホーム画面用 -->
  <link rel="apple-touch-icon" sizes="180x180" href="https://avatars.githubusercontent.com/u/131579504?v=2">
  <meta charset="utf-8" />
  <meta name="Description" content="minecraft 系で役に立つかも？" />
  <meta name="theme-color" content="#f3fca3" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/javascript-obfuscator/dist/index.browser.js"></script>

<style>
textarea{
width:90%;
height:150px;
}
button{
margin:5px;
}
</style>

</head>
<body>

<h2>入力</h2>
<textarea id="input"></textarea>
<br>

<button onclick="obf()">難読化</button>
<button onclick="copy()">Copy</button>

<h2>出力</h2>
<textarea id="output"></textarea>

<script>

function obf(){

const code =
document.getElementById("input").value;

const result =
JavaScriptObfuscator.obfuscate(code,{
compact:true,
controlFlowFlattening:true,
controlFlowFlatteningThreshold:1,
numbersToExpressions:true,
stringArray:true,
stringArrayEncoding:["base64"],
stringArrayThreshold:1
});

document.getElementById("output").value =
result.getObfuscatedCode();

}

function encode(){

const code =
document.getElementById("input").value;

document.getElementById("output").value =
btoa(code);

}

function decode(){

const code =
document.getElementById("input").value;

document.getElementById("output").value =
atob(code);

}

function copy(){

const out =
document.getElementById("output");

out.select();
out.setSelectionRange(0,99999);

navigator.clipboard.writeText(out.value);

alert("コピーしました");

}

</script>

</body>
</html>
